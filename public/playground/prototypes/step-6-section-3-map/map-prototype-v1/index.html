    <!-- Embed mode: set by ?embed=1. Hides dev tools and the language toggle
         so the prototype can be iframed as a clean experience. -->
    <script>
      (function () {
        if (new URLSearchParams(location.search).get("embed") !== "1") return;
        document.documentElement.setAttribute("data-embed", "1");

        document.addEventListener("DOMContentLoaded", function () {
          /* Reparent overlays into #app-container so their `position: absolute`
             resolves against the phone screen, not the iframe viewport. */
          var host = document.getElementById("app-container");
          if (host) {
            ["right-panel", "gallery-modal", "property-quick-look", "evidence-preview"].forEach(function (id) {
              var el = document.getElementById(id);
              if (el) host.appendChild(el);
            });
          }

          /* Apple Maps-style bottom sheet with three detents and drag.
             The sheet is constrained to its absolute parent (#app-container)
             so it can never escape the phone screen. Touch/mouse drag on
             the handle resizes live; release snaps to the nearest detent
             (peek / medium / large). Tap (no movement) cycles to the next
             detent up. */
          var panel = document.getElementById("right-panel");
          if (!panel) return;

          var DETENT_PCT = { peek: 0.28, medium: 0.56, large: 0.88 };
          var DETENT_ORDER = ["peek", "medium", "large"];
          var currentDetent = "peek";

          function setDetent(name) {
            currentDetent = name;
            panel.classList.remove("sheet-peek", "sheet-medium", "sheet-large");
            panel.classList.add("sheet-" + name);
            panel.style.height = "";
          }
          function cycleDetentUp() {
            var i = DETENT_ORDER.indexOf(currentDetent);
            if (i < DETENT_ORDER.length - 1) setDetent(DETENT_ORDER[i + 1]);
            else setDetent(DETENT_ORDER[0]);
          }
          function snapToNearest(pixelHeight, parentHeight) {
            var ratio = pixelHeight / parentHeight;
            var nearest = DETENT_ORDER[0];
            var bestDelta = Infinity;
            DETENT_ORDER.forEach(function (name) {
              var d = Math.abs(DETENT_PCT[name] - ratio);
              if (d < bestDelta) {
                bestDelta = d;
                nearest = name;
              }
            });
            setDetent(nearest);
          }

          setDetent("peek");

          var handle = document.createElement("button");
          handle.type = "button";
          handle.className = "sheet-handle-hit";
          handle.setAttribute("aria-label", "Resize sheet");
          panel.appendChild(handle);

          /* Drag implementation. Tracks pointer Y and updates panel height
             in real time. On release, snaps to the nearest detent. A drag
             of less than 6px is treated as a tap and cycles up one detent. */
          var dragging = false;
          var startY = 0;
          var startHeight = 0;
          var moved = 0;

          function getParentHeight() {
            return panel.parentElement
              ? panel.parentElement.getBoundingClientRect().height
              : 720;
          }
          function onPointerDown(e) {
            dragging = true;
            moved = 0;
            startY = e.touches ? e.touches[0].clientY : e.clientY;
            startHeight = panel.getBoundingClientRect().height;
            panel.classList.add("sheet-dragging");
            if (e.cancelable) e.preventDefault();
          }
          function onPointerMove(e) {
            if (!dragging) return;
            var y = e.touches ? e.touches[0].clientY : e.clientY;
            var dy = y - startY;
            moved = Math.abs(dy);
            var parentH = getParentHeight();
            var maxH = parentH - 60;
            var minH = parentH * 0.18;
            var nextH = Math.max(minH, Math.min(maxH, startHeight - dy));
            panel.style.height = nextH + "px";
            if (e.cancelable) e.preventDefault();
          }
          function onPointerUp() {
            if (!dragging) return;
            dragging = false;
            panel.classList.remove("sheet-dragging");
            if (moved < 6) {
              cycleDetentUp();
              return;
            }
            var h = panel.getBoundingClientRect().height;
            snapToNearest(h, getParentHeight());
          }

          handle.addEventListener("touchstart", onPointerDown, { passive: false });
          handle.addEventListener("mousedown", onPointerDown);
          window.addEventListener("touchmove", onPointerMove, { passive: false });
          window.addEventListener("mousemove", onPointerMove);
          window.addEventListener("touchend", onPointerUp);
          window.addEventListener("mouseup", onPointerUp);
          window.addEventListener("touchcancel", onPointerUp);

          /* When peeked, tapping anywhere inside the sheet body raises it
             to medium so users can see the rest. Buttons and toggles are
             excluded so their own actions still work. */
          panel.addEventListener("click", function (e) {
            if (currentDetent !== "peek") return;
            if (e.target.closest("button, a, input, label, .sheet-handle-hit"))
              return;
            setDetent("medium");
          });

          /* Reset to peek on step change so the map remains the focal point. */
          var mo = new MutationObserver(function (mutations) {
            mutations.forEach(function (m) {
              if (m.type !== "childList") return;
              if (m.target.id !== "panel-content") return;
              if (panel.classList.contains("visible")) setDetent("peek");
            });
          });
          var content = document.getElementById("panel-content");
          if (content) mo.observe(content, { childList: true });
        });
      })();
    </script>
    <style>
      [data-embed="1"] #camera-debug-toggle,
      [data-embed="1"] #camera-debug,
      [data-embed="1"] #qa-toggle,
      [data-embed="1"] #qa-panel,
      [data-embed="1"] #camera-explorer-toggle,
      [data-embed="1"] #camera-explorer,
      [data-embed="1"] #step-jumper-toggle,
      [data-embed="1"] #step-jumper,
      [data-embed="1"] #lang-toggle,
      [data-embed="1"] #panel-toggle,
      [data-embed="1"] #layers-toggle,
      [data-embed="1"] #time-toggle,
      [data-embed="1"] #journey-progress {
        display: none !important;
      }

      /* ───── Embed mode: iPhone 17 Pro frame ─────
         Matches the JSX PhoneFrame used by the other playground
         prototypes. The iframe viewport is 440 x 900 (playground
         constant). We paint the neutral page on <html>, center a
         380 x 732 bezel on <body>, and the app fills the 368 x 720
         screen inside. The `transform` on body makes body the
         containing block for descendants with `position: fixed`,
         so the right panel, gallery, and overlays stay inside the
         phone screen instead of escaping to the iframe viewport. */
      [data-embed="1"] {
        background: #EDEEF1;
      }
      html[data-embed="1"] {
        min-height: 100%;
      }
      [data-embed="1"] body {
        width: 380px;
        height: 732px;
        padding: 6px;
        margin: 0 auto;
        box-sizing: border-box;
        background: #1A1A1E;
        border-radius: 44px;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05);
        overflow: hidden;
        position: relative;
        transform: translate(0, 0);
      }
      [data-embed="1"] #app-container {
        position: relative;
        top: auto;
        left: auto;
        width: 100%;
        height: 100%;
        border-radius: 40px;
        overflow: hidden;
        background: #F9F9F9;
      }
      [data-embed="1"] #map-container {
        border-radius: 40px;
        overflow: hidden;
      }

      /* Full-screen modal overlays stay inside the phone screen. The
         bottom sheet (#right-panel) and the nav arrows are styled in
         embed-mobile.css. */
      [data-embed="1"] #gallery-modal,
      [data-embed="1"] #property-quick-look,
      [data-embed="1"] #evidence-preview {
        position: absolute;
        inset: 0;
        width: auto;
        height: auto;
        border-radius: 40px;
        overflow: hidden;
      }
    </style>

    <!-- Skip Link for keyboard users -->
    <a href="#map-container" class="skip-link">跳至主要內容</a>

    <!-- Start screen removed - map loads directly -->
    <div id="start-screen" style="display: none"></div>

    <!-- Main App Container -->

      <!-- Map Container -->
      <div id="map-container" tabindex="-1">
        <div
          id="map"
          role="application"
          aria-label="熊本投資區域互動地圖"
        ></div>
        <!-- Screen reader announcements for map interactions -->
        <div
          id="map-announcements"
          class="sr-only"
          aria-live="polite"
          aria-atomic="true"
        ></div>

        <!-- Journey Progress Bar (populated dynamically by UI.updateJourneyProgress) -->
        <nav
          id="journey-progress"
          class="hidden"
          role="progressbar"
          aria-valuemin="1"
          aria-label="旅程進度"
        ></nav>

        <!-- Time Toggle -->
        <div
          id="time-toggle"
          class="hidden"
          role="radiogroup"
          aria-label="地圖時間檢視"
        >
          <button
            id="present-btn"
            class="time-btn active"
            role="radio"
            aria-checked="true"
          >
            現在
          </button>
          <button
            id="future-btn"
            class="time-btn"
            role="radio"
            aria-checked="false"
          >
            未來
          </button>
        </div>

        <!-- Nav arrows (replaces chatbox + FAB) -->
        <div class="nav-arrows" id="nav-arrows" style="display: none;">
          <button class="nav-btn back" id="nav-back" aria-label="Previous step">
            <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          </button>
          <button class="nav-btn forward" id="nav-forward" aria-label="Next step">
            <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>
        </div>

        <!-- Layers Toggle Button (hidden until journey starts) -->
        <button
          id="layers-toggle"
          class="hidden"
          aria-label="切換地圖圖層"
          aria-expanded="false"
        >
          <svg
            aria-hidden="true"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
            <polyline points="2 17 12 22 22 17"></polyline>
            <polyline points="2 12 12 17 22 12"></polyline>
          </svg>
        </button>


        <!-- Data Layers Panel (journey-aware, toggled by button) -->
        <div
          id="data-layers"
          class="hidden"
          role="region"
          aria-label="資料圖層"
        >
          <div class="layers-title">資料圖層</div>
          <div class="layer-items" id="data-layer-items">
            <!-- Populated by JS - includes both map layers and data layers -->
          </div>
        </div>

          id="camera-debug-toggle"
          aria-label="Toggle camera debug"
          title="Camera debug"

            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"
            />
          </svg>
        </button>
        <div id="camera-debug" class="hidden">
          <div class="camera-debug-header">
            <span class="camera-debug-title">Camera</span>
            <button

              aria-label="Copy camera values"
              title="Copy to clipboard"
            >
              <svg
                aria-hidden="true"
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <rect width="14" height="14" x="8" y="8" rx="2" />
                <path
                  d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"
                />
              </svg>
            </button>
          </div>
          <div class="camera-debug-grid">
            <div class="camera-debug-row">
              <span class="camera-debug-label">lat</span>
              <span class="camera-debug-value" id="cam-lat">--</span>
            </div>
            <div class="camera-debug-row">
              <span class="camera-debug-label">lng</span>
              <span class="camera-debug-value" id="cam-lng">--</span>
            </div>
            <div class="camera-debug-row">
              <span class="camera-debug-label">zoom</span>
              <span class="camera-debug-value" id="cam-zoom">--</span>
            </div>
            <div class="camera-debug-row">
              <span class="camera-debug-label">pitch</span>
              <span class="camera-debug-value" id="cam-pitch">--</span>
            </div>
            <div class="camera-debug-row">
              <span class="camera-debug-label">bearing</span>
              <span class="camera-debug-value" id="cam-bearing">--</span>
            </div>
          </div>
        </div>

        <!-- QA Reporter (dev tool, top-left below camera debug) -->
        <button
          id="qa-toggle"
          aria-label="Toggle QA reporter"
          title="QA reporter"
        >
          <svg
            aria-hidden="true"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"
            />
            <path d="m9 14 2 2 4-4" />
            <rect x="8" y="2" width="8" height="4" rx="1" ry="1" />
          </svg>
        </button>
        <div id="qa-panel" class="hidden">
          <div class="qa-header">
            <span class="qa-title">QA reporter</span>
            <span class="qa-count" id="qa-count">0</span>
            <button
              id="qa-copy"
              class="qa-header-btn"
              aria-label="Copy all unsolved issues"
              title="Copy unsolved issues"
            >
              <svg
                aria-hidden="true"
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <rect width="14" height="14" x="8" y="8" rx="2" />

                />
              </svg>
            </button>
          </div>
          <div class="qa-step-indicator" id="qa-step-indicator">Step: --</div>
          <div class="qa-form">
            <div class="qa-categories" id="qa-categories">
              <!-- Populated by JS -->
            </div>
            <textarea
              id="qa-description"
              class="qa-textarea"
              placeholder="Describe the issue..."

            ></textarea>
            <button id="qa-add" class="qa-add-btn" disabled>Add issue</button>
          </div>
          <div class="qa-divider"></div>
          <div class="qa-issues" id="qa-issues">
            <!-- Populated by JS -->
          </div>
        </div>

        <!-- Camera Explorer (dev only) -->
        <button
          id="camera-explorer-toggle"
          aria-label="Toggle camera explorer"
          title="Camera explorer"
        >
          <svg
            aria-hidden="true"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"
            />
            <circle cx="12" cy="13" r="3" />
          </svg>
        </button>
        <div id="camera-explorer" class="hidden">
          <div class="camera-explorer-header">
            <span class="camera-explorer-title">Camera explorer</span>
            <button class="camera-explorer-view-toggle">Switch to 3D</button>
          </div>
          <div class="camera-explorer-fields">
            <div class="camera-explorer-row">
              <span class="camera-explorer-label">lng, lat</span>
              <span class="camera-explorer-value" data-field="lnglat">--</span>
            </div>
            <div class="camera-explorer-row">
              <span class="camera-explorer-label">lat, lng</span>
              <span class="camera-explorer-value" data-field="latlng">--</span>
            </div>
            <div class="camera-explorer-row">
              <span class="camera-explorer-label">zoom</span>
              <span class="camera-explorer-value" data-field="zoom">--</span>
            </div>
            <div class="camera-explorer-row">
              <span class="camera-explorer-label">pitch</span>
              <span class="camera-explorer-value" data-field="pitch">--</span>
            </div>
            <div class="camera-explorer-row">
              <span class="camera-explorer-label">bearing</span>
              <span class="camera-explorer-value" data-field="bearing">--</span>
            </div>
          </div>
          <div class="camera-explorer-divider"></div>
          <div class="camera-explorer-toggles">
            <button class="camera-explorer-layer-toggle" data-layer="buildings">
              3D buildings
            </button>
            <button class="camera-explorer-layer-toggle" data-layer="labels">
              Labels
            </button>
            <button class="camera-explorer-layer-toggle" data-layer="terrain">
              Terrain
            </button>
          </div>
          <div class="camera-explorer-divider"></div>
          <div class="camera-explorer-sliders">
            <div class="camera-explorer-slider-row">
              <label class="camera-explorer-slider-label">zoom</label>
              <input
                type="range"
                class="camera-explorer-range"
                data-control="zoom"
                min="1"
                max="22"
                step="0.1"
              />
              <span
                class="camera-explorer-slider-value"
                data-control-value="zoom"
                >--</span
              >
            </div>
            <div class="camera-explorer-slider-row">
              <label class="camera-explorer-slider-label">pitch</label>
              <input
                type="range"
                class="camera-explorer-range"
                data-control="pitch"
                min="0"
                max="85"
                step="1"
              />
              <span
                class="camera-explorer-slider-value"
                data-control-value="pitch"
                >--</span
              >
            </div>
            <div class="camera-explorer-slider-row">
              <label class="camera-explorer-slider-label">bearing</label>
              <input
                type="range"
                class="camera-explorer-range"
                data-control="bearing"
                min="-180"
                max="180"
                step="1"
              />
              <span
                class="camera-explorer-slider-value"
                data-control-value="bearing"
                >--</span
              >
            </div>
            <div class="camera-explorer-slider-row">
              <label class="camera-explorer-slider-label">terrain</label>
              <input
                type="range"
                class="camera-explorer-range"
                data-control="exaggeration"

                max="5"
                step="0.1"
                value="1.5"
              />
              <span
                class="camera-explorer-slider-value"
                data-control-value="exaggeration"
                >1.5</span
              >
            </div>
          </div>
          <div class="camera-explorer-divider"></div>
          <pre class="camera-explorer-config">{ ... }</pre>
          <button class="camera-explorer-copy">Copy config</button>
        </div>

            <line x1="3" x2="3.01" y1="6" y2="6" />
            <line x1="3" x2="3.01" y1="12" y2="12" />

        </div>

          id="panel-toggle"
          class="hidden"
          aria-label="切換儀表板"
          aria-expanded="false"
        >
          <svg
            aria-hidden="true"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect width="18" height="18" x="3" y="3" rx="2" />
            <path d="M15 3v18" />
          </svg>
        </button>

        <!-- Dashboard Toggle Button - removed in v2 overhaul -->
      </div>

      <!-- Dashboard -->

        id="right-panel"
        class="hidden"
        role="complementary"
        aria-label="儀表板"
      >
        <div class="panel-toolbar">
          <button id="panel-home" class="hidden" aria-label="回到儀表板首頁">
            <svg
              aria-hidden="true"

              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >

              <polyline points="9 22 9 12 15 12 15 22"></polyline>

          </button>

              height="24"

              stroke-linecap="round"
              stroke-linejoin="round"

    <!-- Language toggle (top-right) -->
    <button id="lang-toggle" aria-label="切換語言">EN</button>
    <script>
      (function () {
        const btn = document.getElementById("lang-toggle");
        // Optional ?lang= query-param overrides localStorage. Used by embeds
        // that need a deterministic language regardless of prior visits.
        const urlLang = new URLSearchParams(location.search).get("lang");
        if (urlLang === "en" || urlLang === "zh-TW") {
          localStorage.setItem("app-lang", urlLang);
        }
        const current = localStorage.getItem("app-lang") || "zh-TW";
        document.documentElement.lang = current;
        btn.textContent = current === "zh-TW" ? "EN" : "中文";
        btn.addEventListener("click", function () {
          const next = current === "zh-TW" ? "en" : "zh-TW";
          localStorage.setItem("app-lang", next);
          location.reload();
        });
      })();
    </script>
