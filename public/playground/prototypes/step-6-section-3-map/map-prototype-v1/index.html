  <body>
    <!-- Narrow the drawer's step list without editing the upstream
         manifest.ts.

         The playground manifest passes
         ?steps=government-support,corporate-investment,transport-access,future-outlook
         on this drawer's URL. The bundle reads ?steps= once at module
         load, rewrites its internal K array to contain only those
         ids, and reindexes them 1..N. future-outlook is not wanted in
         this drawer, so we rewrite the URL via history.replaceState
         before the deferred module script reads it. Order of
         execution guarantees this works: classic inline scripts in
         body run during parsing; module scripts in head are deferred
         until parsing completes, so they see the rewritten URL.

         After the filter, the remaining K is:
           K[0] = government-support (index 1)
           K[1] = corporate-investment (index 2)
           K[2] = transport-access    (index 3) — "Science park and grand airport"
         so the redirect script below targets step 1 and clamps [1, 3]. -->
    <script>
      (function () {
        try {
          var u = new URL(window.location.href);
          var raw = u.searchParams.get("steps");
          if (!raw) return;
          var KEEP = ["government-support", "corporate-investment", "transport-access"];
          var filtered = raw
            .split(",")
            .map(function (s) { return s.trim(); })
            .filter(function (s) { return s && KEEP.indexOf(s) !== -1; });
          // Preserve the KEEP order so the bundle reindexes exactly how we want.
          filtered.sort(function (a, b) { return KEEP.indexOf(a) - KEEP.indexOf(b); });
          u.searchParams.set("steps", filtered.join(","));
          history.replaceState(null, "", u.toString());
        } catch (_e) {}
      })();
    </script>

    <!-- Embed mode: set by ?embed=1. Hides dev tools and the language toggle
         so the prototype can be iframed as a clean experience. -->
    <script>
      (function () {
        if (new URLSearchParams(location.search).get("embed") !== "1") return;
        document.documentElement.setAttribute("data-embed", "1");
        // Cover the screen with a solid F9F9F9 overlay during setup so
        // the user never sees the bundle's default map view or the
        // step-1 entry camera flash before the Tokyo-Kumamoto framing
        // is applied. Using an overlay instead of opacity/visibility on
        // <html> because some browsers pause WebGL context rendering
        // in invisible elements, which would stop the map from
        // finishing its setup. The map renders normally underneath.
        var cover = document.createElement("div");
        cover.id = "__setup-cover";
        cover.style.cssText = [
          "position:fixed",
          "inset:0",
          "background:#F9F9F9",
          "z-index:99999",
          "pointer-events:none",
        ].join(";");
        function uncover() {
          if (cover && cover.parentNode) cover.parentNode.removeChild(cover);
          cover = null;
        }
        window.__uncoverSetup = uncover;
        // Safety reveal in case the normal trigger never fires. Short
        // because the fast-entry window caps camera durations, so the
        // final auto-fit should complete well under 1s.
        setTimeout(uncover, 3000);
        if (document.body) {
          document.body.appendChild(cover);
        } else {
          document.addEventListener("DOMContentLoaded", function () {
            if (cover) document.body.appendChild(cover);
          });
        }

        document.addEventListener("DOMContentLoaded", function () {
          /* Reparent overlays into #app-container so their `position: absolute`
             resolves against the phone screen, not the iframe viewport. */
          var host = document.getElementById("app-container");
          if (host) {
            ["right-panel", "gallery-modal", "property-quick-look", "evidence-preview"].forEach(function (id) {
              var el = document.getElementById(id);
              if (el) host.appendChild(el);
            });
          }

          /* Custom persistent panel over the map. HIG does not name this
             exact pattern — Apple's own iOS place-card is a sheet — but
             this prototype deliberately diverges: the card shows one
             summary per step with no hidden secondary content and no
             reason to resize or dismiss. Pinned to the bottom at the peek
             detent. The bundle does not manipulate sheet-* classes at
             runtime (verified by source grep), so a one-shot add of
             sheet-peek on load is sufficient. No drag, no grabber. */
          var panel = document.getElementById("right-panel");
          if (panel) panel.classList.add("sheet-peek");
        });
      })();
    </script>
    <style>

      }

      /* ───── Embed mode ─────
         Playground page wraps this iframe in the standard iPhone 17
         Pro frame, so here we just fill the iframe viewport. The
         `transform` on body makes body the containing block for
         descendants with `position: fixed`, so the right panel,
         gallery, and overlays stay inside the phone screen instead
         of escaping to the iframe viewport. */
      [data-embed="1"] {
        background: #F9F9F9;
      }
      html[data-embed="1"],
      [data-embed="1"] body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        box-sizing: border-box;
      }
      [data-embed="1"] body {
        background: #F9F9F9;
        position: relative;
        transform: translate(0, 0);
      }
      [data-embed="1"] #app-container {
        position: relative;
        top: auto;
        left: auto;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #F9F9F9;
      }
      [data-embed="1"] #map-container {
        overflow: hidden;
      }

      /* Full-screen modal overlays stay inside the phone screen. The
         bottom sheet (#right-panel) and the nav arrows are styled in
         embed-mobile.css. */
      [data-embed="1"] #gallery-modal,
      [data-embed="1"] #property-quick-look,
      [data-embed="1"] #evidence-preview {
        position: absolute;
        inset: 0;
        width: auto;
        height: auto;
        overflow: hidden;
      }
    </style>

              <span class="camera-explorer-value" data-field="latlng">--</span>

    <!-- 2D/3D view toggle (Apple Maps style) -->
    <style>
      #view-mode-toggle {
        position: absolute;
        top: 60px;
        left: 16px;
        z-index: 250;
        min-width: 44px;
        height: 32px;
        padding: 0 12px;
        display: none;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 9999px;
        background: #F9F9F9;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08),
          0 1px 3px rgba(0, 0, 0, 0.04);
        color: #25272c;
        font-family: "Noto Sans JP", system-ui, sans-serif;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.01em;
        cursor: pointer;
        transition: background 120ms ease, transform 120ms ease;
      }
      [data-embed="1"] #view-mode-toggle {
        display: inline-flex;
      }
      #view-mode-toggle:active {
        transform: scale(0.96);
      }
      #map-container.immersive-active #view-mode-toggle {
        opacity: 0;
        pointer-events: none;
        transition: opacity var(--duration-fast) var(--easing-accelerate);
      }
    </style>
    <button id="view-mode-toggle" aria-label="Toggle 2D and 3D view" type="button">
      3D
    </button>
    <script>
      (function () {
        var btn = document.getElementById("view-mode-toggle");
        var STORAGE_KEY = "map-view-mode";
        var PITCH_3D = 60;
        function getMode() {
          var m = localStorage.getItem(STORAGE_KEY);
          return m === "3d" ? "3d" : "2d";
        }
        function setLabel() {
          btn.textContent = getMode() === "2d" ? "3D" : "2D";
        }
        setLabel();
        var patched = false;
        function patchMap(map) {
          if (patched || !map) return;
          patched = true;
          var origFlyTo = map.flyTo.bind(map);
          var origEaseTo = map.easeTo.bind(map);
          var origFitBounds = map.fitBounds.bind(map);
          function applyMode(opts) {
            opts = Object.assign({}, opts || {});
            if (getMode() === "2d") {
              opts.pitch = 0;
              opts.bearing = 0;
            } else {
              if (opts.pitch == null || opts.pitch < 20) opts.pitch = PITCH_3D;
            }
            return opts;
          }
          // Framing rules for every map move:
          //  (a) the focal area must sit >=16px above the base bottom sheet
          //      (done with Mapbox padding), and
          //  (b) the camera must be wide enough to show the step's on-map
          //      content (approximated here with a small zoom-out on
          //      flyTo/easeTo; fitBounds already fits content so it only
          //      gets the padding).
          var SHEET_CLEARANCE_PX = 16;
          var EDGE_PAD_PX = 16;
          var ZOOM_OUT_ADJUST = 0.6;
          function getSheetHeight() {
            var el = document.getElementById("right-panel");
            if (el) {
              var r = el.getBoundingClientRect();
              if (r && r.height) return r.height;
            }
            var mc = document.getElementById("map-container");
            if (mc) {
              var rc = mc.getBoundingClientRect();
              if (rc && rc.height) return rc.height * 0.38;
            }
            return 0;
          }
          function buildFramingPadding(existing) {
            existing = existing || {};
            var bottomNeeded = getSheetHeight() + SHEET_CLEARANCE_PX;
            return {
              top:    typeof existing.top    === "number" ? Math.max(existing.top, EDGE_PAD_PX) : EDGE_PAD_PX,
              right:  typeof existing.right  === "number" ? Math.max(existing.right, EDGE_PAD_PX) : EDGE_PAD_PX,
              bottom: typeof existing.bottom === "number" ? Math.max(existing.bottom, bottomNeeded) : bottomNeeded,
              left:   typeof existing.left   === "number" ? Math.max(existing.left, EDGE_PAD_PX) : EDGE_PAD_PX,
            };
          }
          function applyFraming(opts, options) {
            opts = Object.assign({}, opts || {});
            opts.padding = buildFramingPadding(opts.padding);
            if (options && options.zoomOut && typeof opts.zoom === "number") {
              opts.zoom = Math.max(0, opts.zoom - ZOOM_OUT_ADJUST);
            }
            // Shorten every camera move during the initial entry window
            // so the drawer lands on its target state fast. Capped (not
            // zero) so the bundle's step-entry chain, which waits on
            // real moveend events, still gets genuine animation frames.
            if (window.__initialEntry) {
              if (typeof opts.duration !== "number" || opts.duration > 250) {
                opts.duration = 250;
              }
            }
            return opts;
          }
          map.flyTo = function (opts) {
            return origFlyTo(applyMode(applyFraming(opts, { zoomOut: true })));
          };
          map.easeTo = function (opts) {
            return origEaseTo(applyMode(applyFraming(opts, { zoomOut: true })));
          };
          map.fitBounds = function (bounds, opts) {
            return origFitBounds(bounds, applyMode(applyFraming(opts, { zoomOut: false })));
          };
          // Auto-fit to step content.
          // When the bundle adds a GeoJSON source (the arcs, polygons,
          // dots, routes it draws for the current step), widen the camera
          // to the union of recently-added source bounds so every piece of
          // the step's on-map content is visible, framed per the sheet
          // clearance rules above. Runs only after the map's first idle so
          // basemap sources loaded during boot are excluded.
          //
          // Step-specific opt-outs: the bundle's own cameraKey for
          // these steps already produces the desired framing once my
          // sheet-clearance padding is applied. Auto-fitting to their
          // GeoJSON bounds (semiconductor network for corporate,
          // two small circles for transport-access) zooms in too
          // tight and crops out the surrounding context the user
          // wants visible. Skip the fit and let the bundle's flyTo
          // stand.
          var SKIP_AUTOFIT_STEPS = ["corporate-investment", "transport-access"];
          var contentBatch = null;
          var batchTimer = null;
          var mapReady = false;
          map.once("idle", function () { mapReady = true; });
          function currentStepId() {
            var a = window.App;
            var steps = window.STEPS;
            if (!a || !a.state || !steps) return null;
            var s = steps[a.state.currentStep - 1];
            return (s && s.id) || null;
          }
          function computeGeoJSONBounds(g) {
            var mnLng = Infinity, mnLat = Infinity, mxLng = -Infinity, mxLat = -Infinity;
            function consume(c) {
              if (typeof c[0] === "number") {
                if (c[0] < mnLng) mnLng = c[0];
                if (c[0] > mxLng) mxLng = c[0];
                if (c[1] < mnLat) mnLat = c[1];
                if (c[1] > mxLat) mxLat = c[1];
              } else if (Array.isArray(c)) {
                for (var i = 0; i < c.length; i++) consume(c[i]);
              }
            }
            var feats = g && g.type === "FeatureCollection" ? g.features : [g];
            for (var i = 0; i < feats.length; i++) {
              var f = feats[i];
              if (!f) continue;
              var geom = f.type === "Feature" ? f.geometry : f;
              if (geom && geom.coordinates) consume(geom.coordinates);
            }
            if (mnLng === Infinity) return null;
            return [[mnLng, mnLat], [mxLng, mxLat]];
          }
          function bumpBatch(b) {
            if (!contentBatch) {
              contentBatch = [[b[0][0], b[0][1]], [b[1][0], b[1][1]]];
            } else {
              contentBatch[0][0] = Math.min(contentBatch[0][0], b[0][0]);
              contentBatch[0][1] = Math.min(contentBatch[0][1], b[0][1]);
              contentBatch[1][0] = Math.max(contentBatch[1][0], b[1][0]);
              contentBatch[1][1] = Math.max(contentBatch[1][1], b[1][1]);
            }
            if (batchTimer) clearTimeout(batchTimer);
            batchTimer = setTimeout(function () {
              var b2 = contentBatch;
              contentBatch = null;
              batchTimer = null;
              if (!b2) return;
              function finishEntryWindow() {
                window.__initialEntry = false;
                if (window.__initialEntryTimer) {
                  clearTimeout(window.__initialEntryTimer);
                  window.__initialEntryTimer = null;
                }
                if (typeof window.__uncoverSetup === "function") {
                  window.__uncoverSetup();
                }
              }
              if (SKIP_AUTOFIT_STEPS.indexOf(currentStepId()) !== -1) {
                // Step opted out of auto-fit — the bundle's cameraKey
                // flyTo (already capped during the entry window) is the
                // final camera. Nothing more to do; release the entry
                // window and uncover any overlay that is still up.
                finishEntryWindow();
                return;
              }
              map.stop();
              // Reveal the prototype the instant the final fit
              // completes so the user sees the correct framing
              // immediately instead of any intermediate camera states.
              // Attach AFTER stop() so a spurious moveend from
              // interrupting a prior animation does not uncover the
              // overlay before the fit actually starts.
              map.once("moveend", finishEntryWindow);
              map.fitBounds(b2, { duration: 600 });
            }, 250);
          }
          var origAddSource = map.addSource.bind(map);
          map.addSource = function (id, src) {
            var r = origAddSource(id, src);
            if (mapReady && src && src.type === "geojson" && src.data) {
              var b = computeGeoJSONBounds(src.data);
              if (b) bumpBatch(b);
            }
            return r;
          };
          if (typeof map.removeSource === "function") {
            var origRemoveSource = map.removeSource.bind(map);
            map.removeSource = function (id) {
              contentBatch = null;
              if (batchTimer) { clearTimeout(batchTimer); batchTimer = null; }
              return origRemoveSource(id);
            };
          }
          // Apply initial mode + framing to the current view
          origEaseTo(applyFraming({
            center: map.getCenter(),
            zoom: map.getZoom(),
            pitch: getMode() === "2d" ? 0 : PITCH_3D,
            bearing: getMode() === "2d" ? 0 : map.getBearing(),
            duration: 0,
          }, { zoomOut: false }));
          btn.addEventListener("click", function () {
            var next = getMode() === "2d" ? "3d" : "2d";
            localStorage.setItem(STORAGE_KEY, next);
            setLabel();
            origEaseTo(applyFraming({
              center: map.getCenter(),
              zoom: map.getZoom(),
              pitch: next === "2d" ? 0 : PITCH_3D,
              bearing: next === "2d" ? 0 : map.getBearing(),
              duration: 500,
            }, { zoomOut: false }));
          });
        }
        function waitForMap() {
          if (window.__mbmap) {
            patchMap(window.__mbmap);
            return;
          }
          setTimeout(waitForMap, 80);
        }
        waitForMap();
      })();
    </script>

    <!-- Step-6 drawer scope:
           Starts on: internal step 1 (Government support).
           Navigable: internal steps 1, 2, 3 only
                      (Government → Corporate investment → Science park).
         The bundle's App.init() does NOT call goToStep(1) — that only
         happens inside restart(). So the drawer sits at currentStep=0
         forever unless we fire the jump ourselves. Two pieces:
           (A) A window setter wraps App.goToStep the moment the bundle
               assigns window.App. The wrapper clamps every call to
               [MIN_STEP, MAX_STEP] and no-ops if already at the target,
               so nav arrows stop at the boundaries and don't re-enter
               the same step.
           (B) Once App + map style are ready, we actively call
               App.goToStep(TARGET_STEP). The bundle's step-entry
               animates at its natural durations; the overlay created
               in the embed-mode script hides all of it until the final
               Tokyo-Kumamoto fit fires `moveend`, so the user sees no
               intermediate camera states.
         Defineproperty is the fast path; polling falls back if window
         setters are rejected. -->
    <script>
      (function () {
        // After the ?steps= URL rewrite at the top of body, the bundle's
        // K array is reindexed to:
        //   1 = government-support (target)
        //   2 = corporate-investment
        //   3 = transport-access (Science park and grand airport)
        // So this drawer lands on 1 and clamps nav to [1, 3].
        var TARGET_STEP = 1;
        var MIN_STEP = 1;
        var MAX_STEP = 3;
        function wrap(app) {
          if (!app || typeof app.goToStep !== "function" || app.__stepRedirect) return;
          app.__stepRedirect = true;
          var orig = app.goToStep.bind(app);
          app.goToStep = function (n) {
            if (n < MIN_STEP) n = MIN_STEP;
            if (n > MAX_STEP) n = MAX_STEP;
            if (app.state && app.state.currentStep === n) {
              return Promise.resolve();
            }
            // Fast-entry window: every step transition caps camera
            // durations in applyFraming so the drawer lands on each
            // step's final framing (auto-fit to the step's GeoJSON
            // content) without a long bundle-default flyTo first.
            // Cleared by bumpBatch's moveend after the auto-fit
            // completes. Safety timer clears it too in case the
            // target step has no GeoJSON source to trigger auto-fit.
            window.__initialEntry = true;
            if (window.__initialEntryTimer) clearTimeout(window.__initialEntryTimer);
            window.__initialEntryTimer = setTimeout(function () {
              window.__initialEntry = false;
            }, 3000);
            return orig(n);
          };
        }
        var _app;
        try {
          Object.defineProperty(window, "App", {
            configurable: true,
            enumerable: true,
            get: function () { return _app; },
            set: function (v) { _app = v; wrap(v); },
          });
        } catch (_e) {
          (function poll() {
            if (window.App) { wrap(window.App); return; }
            setTimeout(poll, 20);
          })();
        }
        // Allowed step ids in display order. government-support is always
        // first, which is what this drawer must land on.
        var ALLOWED_STEP_IDS = [
          "government-support",
          "corporate-investment",
          "transport-access",
        ];
        // Runtime belt-and-braces: after the bundle has loaded, mutate
        // window.STEPS in place so it contains only the allowed ids, in
        // the allowed order, reindexed 1..N. This is independent of the
        // URL rewrite at the top of body — if the URL rewrite took
        // effect (new HTML), this is an idempotent no-op; if the browser
        // served a cached older HTML (old steps list), this still
        // narrows the list before any step activation.
        function enforceSteps() {
          if (!window.STEPS || !Array.isArray(window.STEPS)) return false;
          // Build a new ordered list from existing entries.
          var byId = {};
          window.STEPS.forEach(function (s) { if (s && s.id) byId[s.id] = s; });
          var ordered = ALLOWED_STEP_IDS
            .map(function (id) { return byId[id]; })
            .filter(Boolean);
          if (ordered.length === 0) return false;
          // Mutate in place so all existing references to window.STEPS
          // see the narrowed list.
          window.STEPS.length = 0;
          for (var i = 0; i < ordered.length; i++) {
            ordered[i].index = i + 1;
            window.STEPS.push(ordered[i]);
          }
          return true;
        }
        var triggered = false;
        function triggerInitial() {
          if (triggered) return;
          if (!window.App || typeof window.App.goToStep !== "function") {
            setTimeout(triggerInitial, 40);
            return;
          }
          var m = window.__mbmap;
          if (!m || typeof m.isStyleLoaded !== "function" || !m.isStyleLoaded()) {
            setTimeout(triggerInitial, 40);
            return;
          }
          enforceSteps();
          triggered = true;
          // Bundle's goToStep runs a cinematic double-flyTo intro when
          // entering step 1 from step 0 (the default fresh-load state).
          // Pretending we came from step 2 takes the else branch, which
          // is a single flyTo — cuts ~2s off the entry.
          if (window.App.state) {
            window.App.state.currentStep = 2;
          }
          // Fast-entry window: applyFraming caps camera durations while
          // this is true so the bundle's step-entry runs quickly. Turned
          // off in bumpBatch's moveend after the final Tokyo-Kumamoto
          // fit completes.
          window.__initialEntry = true;
          try { window.App.goToStep(TARGET_STEP); } catch (_) {}
        }
        triggerInitial();
      })();
    </script>

    <!-- Government step: default to "Central" so the Tokyo-Kumamoto
         arc and both endpoint pins frame the camera on entry instead
         of requiring a tap to reveal. "Armed" disarms after we
         auto-toggle once per visit so users can still turn it off
         without being overridden. -->
    <script>
      (function () {
        var PANEL_ID = "panel-content";
        var CENTRAL_ID = "central";
        var armed = true;
        function onGovernmentPanel() {
          var el = document.getElementById(PANEL_ID);
          if (!el) return false;
          return !!el.querySelector('[onclick*="toggleGovernmentLevel"]');
        }
        function tryAutoToggle() {
          if (onGovernmentPanel()) {
            if (!armed) return;
            if (!window.App || typeof window.App.toggleGovernmentLevel !== "function") return;
            var active = (window.App.state && window.App.state.activeGovernmentLevels) || [];
            if (active.indexOf(CENTRAL_ID) === -1) {
              try { window.App.toggleGovernmentLevel(CENTRAL_ID); } catch (_) {}
            }
            armed = false;
          } else {
            armed = true;
          }
        }
        function start() {
          var target = document.getElementById(PANEL_ID);
          if (!target) { setTimeout(start, 80); return; }
          var mo = new MutationObserver(tryAutoToggle);
          mo.observe(target, { childList: true, subtree: true });
          tryAutoToggle();
        }
        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", start);
        } else {
          start();
        }
      })();
    </script>
