  <body>
    <!-- Embed mode: set by ?embed=1. Hides dev tools and the language toggle
         so the prototype can be iframed as a clean experience. -->
    <script>
      (function () {
        if (new URLSearchParams(location.search).get("embed") !== "1") return;
        document.documentElement.setAttribute("data-embed", "1");
        // Cover the screen with a solid F9F9F9 overlay during setup so
        // the user never sees the bundle's default map view or the
        // step-entry camera flash before the Ozu framing is applied.
        // Using an overlay instead of opacity/visibility on <html>
        // because some browsers pause WebGL context rendering in
        // invisible elements, which would stop the map from finishing
        // its setup. The map renders normally underneath.
        var cover = document.createElement("div");
        cover.id = "__setup-cover";
        cover.style.cssText = [
          "position:fixed",
          "inset:0",
          "background:#F9F9F9",
          "z-index:99999",
          "pointer-events:none",
        ].join(";");
        function uncover() {
          if (cover && cover.parentNode) cover.parentNode.removeChild(cover);
          cover = null;
        }
        window.__uncoverSetup = uncover;
        // Safety reveal in case the normal trigger never fires. Short
        // because the fast-entry window caps camera durations, so the
        // final zone fly should complete well under 1s.
        setTimeout(uncover, 3000);
        if (document.body) {
          document.body.appendChild(cover);
        } else {
          document.addEventListener("DOMContentLoaded", function () {
            if (cover) document.body.appendChild(cover);
          });
        }

        document.addEventListener("DOMContentLoaded", function () {
          /* Reparent overlays into #app-container so their `position: absolute`
             resolves against the phone screen, not the iframe viewport. */
          var host = document.getElementById("app-container");
          if (host) {
            ["right-panel", "gallery-modal", "property-quick-look", "evidence-preview"].forEach(function (id) {
              var el = document.getElementById(id);
              if (el) host.appendChild(el);
            });
          }

          /* Custom persistent panel over the map. HIG does not name this
             exact pattern — Apple's own iOS place-card is a sheet — but
             this prototype deliberately diverges: the card shows one
             summary per step with no hidden secondary content and no
             reason to resize or dismiss. Pinned to the bottom at the peek
             detent. The bundle does not manipulate sheet-* classes at
             runtime (verified by source grep), so a one-shot add of
             sheet-peek on load is sufficient. No drag, no grabber. */
          var panel = document.getElementById("right-panel");
          if (panel) panel.classList.add("sheet-peek");
        });
      })();
    </script>
    <style>
      [data-embed="1"] #camera-debug-toggle,
      [data-embed="1"] #camera-debug,
      [data-embed="1"] #qa-toggle,
      [data-embed="1"] #qa-panel,
      [data-embed="1"] #camera-explorer-toggle,
      [data-embed="1"] #camera-explorer,
      [data-embed="1"] #step-jumper-toggle,
      [data-embed="1"] #step-jumper,
      [data-embed="1"] #lang-toggle,
      [data-embed="1"] #panel-toggle,
      [data-embed="1"] #layers-toggle,
      [data-embed="1"] #time-toggle,
      [data-embed="1"] #journey-progress {
        display: none !important;
      }

      /* ───── Embed mode ─────
         Playground page wraps this iframe in the standard iPhone 17
         Pro frame, so here we just fill the iframe viewport. The
         `transform` on body makes body the containing block for
         descendants with `position: fixed`, so the right panel,
         gallery, and overlays stay inside the phone screen instead
         of escaping to the iframe viewport. */
      [data-embed="1"] {
        background: #F9F9F9;
      }
      html[data-embed="1"],
      [data-embed="1"] body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        box-sizing: border-box;
      }
      [data-embed="1"] body {
        background: #F9F9F9;
        position: relative;
        transform: translate(0, 0);
      }
      [data-embed="1"] #app-container {
        position: relative;
        top: auto;
        left: auto;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #F9F9F9;
      }
      [data-embed="1"] #map-container {
        overflow: hidden;
      }

      /* Full-screen modal overlays stay inside the phone screen. The
         bottom sheet (#right-panel) and the nav arrows are styled in
         embed-mobile.css. */
      [data-embed="1"] #gallery-modal,
      [data-embed="1"] #property-quick-look,
      [data-embed="1"] #evidence-preview {
        position: absolute;
        inset: 0;
        width: auto;
        height: auto;
        overflow: hidden;
      }
    </style>

    <!-- Skip Link for keyboard users -->
    <a href="#map-container" class="skip-link">跳至主要內容</a>

    <!-- Start screen removed - map loads directly -->
    <div id="start-screen" style="display: none"></div>

    <!-- Main App Container -->
    <div id="app-container">
      <!-- Map Container -->
      <div id="map-container" tabindex="-1">
        <div
          id="map"
          role="application"
          aria-label="熊本投資區域互動地圖"
        ></div>
        <!-- Screen reader announcements for map interactions -->
        <div
          id="map-announcements"
          class="sr-only"
          aria-live="polite"
          aria-atomic="true"
        ></div>

        <!-- Journey Progress Bar (populated dynamically by UI.updateJourneyProgress) -->
        <nav
          id="journey-progress"
          class="hidden"
          role="progressbar"
          aria-valuemin="1"
          aria-label="旅程進度"
        ></nav>

        <!-- Time Toggle -->
        <div
          id="time-toggle"
          class="hidden"
          role="radiogroup"
          aria-label="地圖時間檢視"
        >
          <button
            id="present-btn"
            class="time-btn active"
            role="radio"
            aria-checked="true"
          >
            現在
          </button>
          <button
            id="future-btn"
            class="time-btn"
            role="radio"
            aria-checked="false"
          >
            未來
          </button>
        </div>

        <!-- Nav arrows (replaces chatbox + FAB) -->
        <div class="nav-arrows" id="nav-arrows" style="display: none;">
          <button class="nav-btn back" id="nav-back" aria-label="Previous step">
            <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          </button>
          <button class="nav-btn forward" id="nav-forward" aria-label="Next step">
            <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>
        </div>

        <!-- Layers Toggle Button (hidden until journey starts) -->
        <button
          id="layers-toggle"
          class="hidden"
          aria-label="切換地圖圖層"
          aria-expanded="false"
        >
          <svg
            aria-hidden="true"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
            <polyline points="2 17 12 22 22 17"></polyline>
            <polyline points="2 12 12 17 22 12"></polyline>
          </svg>
        </button>


        <!-- Data Layers Panel (journey-aware, toggled by button) -->
        <div
          id="data-layers"
          class="hidden"
          role="region"
          aria-label="資料圖層"
        >
          <div class="layers-title">資料圖層</div>
          <div class="layer-items" id="data-layer-items">
            <!-- Populated by JS - includes both map layers and data layers -->
          </div>
        </div>

        <!-- Camera Debug Tool (dev only, top-left) -->
        <button
          id="camera-debug-toggle"
          aria-label="Toggle camera debug"
          title="Camera debug"
        >
          <svg
            aria-hidden="true"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"
            />
          </svg>
        </button>
        <div id="camera-debug" class="hidden">
          <div class="camera-debug-header">
            <span class="camera-debug-title">Camera</span>
            <button
              id="camera-debug-copy"
              aria-label="Copy camera values"
              title="Copy to clipboard"
            >
              <svg
                aria-hidden="true"
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <rect width="14" height="14" x="8" y="8" rx="2" />
                <path
                  d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"
                />
              </svg>
            </button>
          </div>
          <div class="camera-debug-grid">
            <div class="camera-debug-row">
              <span class="camera-debug-label">lat</span>
              <span class="camera-debug-value" id="cam-lat">--</span>
            </div>
            <div class="camera-debug-row">
              <span class="camera-debug-label">lng</span>
              <span class="camera-debug-value" id="cam-lng">--</span>
            </div>
            <div class="camera-debug-row">
              <span class="camera-debug-label">zoom</span>
              <span class="camera-debug-value" id="cam-zoom">--</span>
            </div>
            <div class="camera-debug-row">
              <span class="camera-debug-label">pitch</span>
              <span class="camera-debug-value" id="cam-pitch">--</span>
            </div>
            <div class="camera-debug-row">
              <span class="camera-debug-label">bearing</span>
              <span class="camera-debug-value" id="cam-bearing">--</span>
            </div>
          </div>
        </div>

        <!-- QA Reporter (dev tool, top-left below camera debug) -->
        <button
          id="qa-toggle"
          aria-label="Toggle QA reporter"
          title="QA reporter"
        >
          <svg
            aria-hidden="true"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"
            />
            <path d="m9 14 2 2 4-4" />
            <rect x="8" y="2" width="8" height="4" rx="1" ry="1" />
          </svg>
        </button>
        <div id="qa-panel" class="hidden">
          <div class="qa-header">
            <span class="qa-title">QA reporter</span>
            <span class="qa-count" id="qa-count">0</span>
            <button
              id="qa-copy"
              class="qa-header-btn"
              aria-label="Copy all unsolved issues"
              title="Copy unsolved issues"
            >
              <svg
                aria-hidden="true"
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <rect width="14" height="14" x="8" y="8" rx="2" />
                <path
                  d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"
                />
              </svg>
            </button>
          </div>
          <div class="qa-step-indicator" id="qa-step-indicator">Step: --</div>
          <div class="qa-form">
            <div class="qa-categories" id="qa-categories">
              <!-- Populated by JS -->
            </div>
            <textarea
              id="qa-description"
              class="qa-textarea"
              placeholder="Describe the issue..."
              rows="3"
            ></textarea>
            <button id="qa-add" class="qa-add-btn" disabled>Add issue</button>
          </div>
          <div class="qa-divider"></div>
          <div class="qa-issues" id="qa-issues">
            <!-- Populated by JS -->
          </div>
        </div>

        <!-- Camera Explorer (dev only) -->
        <button
          id="camera-explorer-toggle"
          aria-label="Toggle camera explorer"
          title="Camera explorer"
        >
          <svg
            aria-hidden="true"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"
            />
            <circle cx="12" cy="13" r="3" />
          </svg>
        </button>
        <div id="camera-explorer" class="hidden">
          <div class="camera-explorer-header">
            <span class="camera-explorer-title">Camera explorer</span>
            <button class="camera-explorer-view-toggle">Switch to 3D</button>
          </div>
          <div class="camera-explorer-fields">
            <div class="camera-explorer-row">
              <span class="camera-explorer-label">lng, lat</span>
              <span class="camera-explorer-value" data-field="lnglat">--</span>
            </div>
            <div class="camera-explorer-row">
              <span class="camera-explorer-label">lat, lng</span>
              <span class="camera-explorer-value" data-field="latlng">--</span>
            </div>
            <div class="camera-explorer-row">
              <span class="camera-explorer-label">zoom</span>
              <span class="camera-explorer-value" data-field="zoom">--</span>
            </div>
            <div class="camera-explorer-row">
              <span class="camera-explorer-label">pitch</span>
              <span class="camera-explorer-value" data-field="pitch">--</span>
            </div>
            <div class="camera-explorer-row">
              <span class="camera-explorer-label">bearing</span>
              <span class="camera-explorer-value" data-field="bearing">--</span>
            </div>
          </div>
          <div class="camera-explorer-divider"></div>
          <div class="camera-explorer-toggles">
            <button class="camera-explorer-layer-toggle" data-layer="buildings">
              3D buildings
            </button>
            <button class="camera-explorer-layer-toggle" data-layer="labels">
              Labels
            </button>
            <button class="camera-explorer-layer-toggle" data-layer="terrain">
              Terrain
            </button>
          </div>
          <div class="camera-explorer-divider"></div>
          <div class="camera-explorer-sliders">
            <div class="camera-explorer-slider-row">
              <label class="camera-explorer-slider-label">zoom</label>
              <input
                type="range"
                class="camera-explorer-range"
                data-control="zoom"
                min="1"
                max="22"
                step="0.1"
              />
              <span
                class="camera-explorer-slider-value"
                data-control-value="zoom"
                >--</span
              >
            </div>
            <div class="camera-explorer-slider-row">
              <label class="camera-explorer-slider-label">pitch</label>
              <input
                type="range"
                class="camera-explorer-range"
                data-control="pitch"
                min="0"
                max="85"
                step="1"
              />
              <span
                class="camera-explorer-slider-value"
                data-control-value="pitch"
                >--</span
              >
            </div>
            <div class="camera-explorer-slider-row">
              <label class="camera-explorer-slider-label">bearing</label>
              <input
                type="range"
                class="camera-explorer-range"
                data-control="bearing"
                min="-180"
                max="180"
                step="1"
              />
              <span
                class="camera-explorer-slider-value"
                data-control-value="bearing"
                >--</span
              >
            </div>
            <div class="camera-explorer-slider-row">
              <label class="camera-explorer-slider-label">terrain</label>
              <input
                type="range"
                class="camera-explorer-range"
                data-control="exaggeration"
                min="0.5"
                max="5"
                step="0.1"
                value="1.5"
              />
              <span
                class="camera-explorer-slider-value"
                data-control-value="exaggeration"
                >1.5</span
              >
            </div>
          </div>
          <div class="camera-explorer-divider"></div>
          <pre class="camera-explorer-config">{ ... }</pre>
          <button class="camera-explorer-copy">Copy config</button>
        </div>

        <!-- Step Jumper (dev only, bottom-left) -->
        <button
          id="step-jumper-toggle"
          aria-label="Toggle step jumper"
          title="Step jumper"
        >
          <svg
            aria-hidden="true"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="8" x2="21" y1="6" y2="6" />
            <line x1="8" x2="21" y1="12" y2="12" />
            <line x1="8" x2="21" y1="18" y2="18" />
            <line x1="3" x2="3.01" y1="6" y2="6" />
            <line x1="3" x2="3.01" y1="12" y2="12" />
            <line x1="3" x2="3.01" y1="18" y2="18" />
          </svg>
        </button>
        <div id="step-jumper" class="hidden">
          <div class="step-jumper-header">
            <span class="step-jumper-title">Step jumper</span>
          </div>
          <div class="step-jumper-list">
            <!-- Populated by JS -->
          </div>
        </div>

        <!-- Dashboard Toggle Button (right side) -->
        <button
          id="panel-toggle"
          class="hidden"
          aria-label="切換儀表板"
          aria-expanded="false"
        >
          <svg
            aria-hidden="true"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect width="18" height="18" x="3" y="3" rx="2" />
            <path d="M15 3v18" />
          </svg>
        </button>

        <!-- Dashboard Toggle Button - removed in v2 overhaul -->
      </div>

      <!-- Dashboard -->
      <aside
        id="right-panel"
        class="hidden"
        role="complementary"
        aria-label="儀表板"
      >
        <div class="panel-toolbar">
          <button id="panel-home" class="hidden" aria-label="回到儀表板首頁">
            <svg
              aria-hidden="true"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
              <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
          </button>
          <button id="panel-close" aria-label="關閉儀表板">
            <svg
              aria-hidden="true"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
        <div id="panel-content"></div>
      </aside>
    </div>

    <!-- Gallery Modal -->
    <div
      id="gallery-modal"
      class="hidden"
      role="dialog"
      aria-modal="true"
      aria-labelledby="gallery-title"
    >
      <div id="gallery-overlay"></div>
      <div id="gallery-content">
        <button id="gallery-close" aria-label="關閉圖庫">
          <svg
            aria-hidden="true"
            width="20"
            height="20"
            viewBox="0 0 16 16"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="14" y1="2" x2="2" y2="14"></line>
            <line x1="2" y1="2" x2="14" y2="14"></line>
          </svg>
        </button>
        <h2 id="gallery-title" class="sr-only">文件檢視器</h2>
        <div id="gallery-body"></div>
      </div>
    </div>

    <!-- Property Image Quick Look Modal (macOS pattern) -->
    <div
      id="property-quick-look"
      class="hidden"
      role="dialog"
      aria-modal="true"
      aria-label="物件圖片放大檢視"
    >
      <div
        id="quick-look-overlay"
        onclick="UI.hidePropertyImageQuickLook()"
      ></div>
      <div id="quick-look-content">
        <button
          id="quick-look-close"
          aria-label="關閉圖片"
          onclick="UI.hidePropertyImageQuickLook()"
        >
          <svg
            aria-hidden="true"
            width="20"
            height="20"
            viewBox="0 0 16 16"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="14" y1="2" x2="2" y2="14"></line>
            <line x1="2" y1="2" x2="14" y2="14"></line>
          </svg>
        </button>
        <img id="quick-look-image" src="" alt="" />
      </div>
    </div>

    <!-- Evidence Preview Overlay -->
    <div
      id="evidence-preview"
      class="hidden"
      role="dialog"
      aria-modal="true"
      aria-label="佐證資料預覽"
    >
      <div
        id="evidence-preview-overlay"
        onclick="UI.hideEvidencePreview()"
      ></div>
      <div id="evidence-preview-content">
        <button
          id="evidence-preview-close"
          aria-label="關閉預覽"
          onclick="UI.hideEvidencePreview()"
        >
          <svg
            aria-hidden="true"
            width="20"
            height="20"
            viewBox="0 0 16 16"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"

    <!-- 2D/3D view toggle (Apple Maps style) -->
    <style>
      #view-mode-toggle {
        position: absolute;
        top: 60px;
        left: 16px;
        z-index: 250;
        min-width: 44px;
        height: 32px;
        padding: 0 12px;
        display: none;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 9999px;
        background: #F9F9F9;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08),
          0 1px 3px rgba(0, 0, 0, 0.04);
        color: #25272c;
        font-family: "Noto Sans JP", system-ui, sans-serif;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.01em;
        cursor: pointer;
        transition: background 120ms ease, transform 120ms ease;
      }
      [data-embed="1"] #view-mode-toggle {
        display: inline-flex;
      }
      #view-mode-toggle:active {
        transform: scale(0.96);
      }
      #map-container.immersive-active #view-mode-toggle {
        opacity: 0;
        pointer-events: none;
        transition: opacity var(--duration-fast) var(--easing-accelerate);
      }
    </style>
    <button id="view-mode-toggle" aria-label="Toggle 2D and 3D view" type="button">
      3D
    </button>
    <script>
      (function () {
        var btn = document.getElementById("view-mode-toggle");
        var STORAGE_KEY = "map-view-mode";
        var PITCH_3D = 60;
        function getMode() {
          var m = localStorage.getItem(STORAGE_KEY);
          return m === "3d" ? "3d" : "2d";
        }
        function setLabel() {
          btn.textContent = getMode() === "2d" ? "3D" : "2D";
        }
        setLabel();
        var patched = false;
        function patchMap(map) {
          if (patched || !map) return;
          patched = true;
          var origFlyTo = map.flyTo.bind(map);
          var origEaseTo = map.easeTo.bind(map);
          var origFitBounds = map.fitBounds.bind(map);
          function applyMode(opts) {
            opts = Object.assign({}, opts || {});
            if (getMode() === "2d") {
              opts.pitch = 0;
              opts.bearing = 0;
            } else {
              if (opts.pitch == null || opts.pitch < 20) opts.pitch = PITCH_3D;
            }
            return opts;
          }
          // Framing rules for every map move:
          //  (a) the focal area must sit >=16px above the base bottom sheet
          //      (done with Mapbox padding), and
          //  (b) the camera must be wide enough to show the step's on-map
          //      content (approximated here with a small zoom-out on
          //      flyTo/easeTo; fitBounds already fits content so it only
          //      gets the padding).
          var SHEET_CLEARANCE_PX = 16;
          var EDGE_PAD_PX = 16;
          var ZOOM_OUT_ADJUST = 0.6;
          function getSheetHeight() {
            var el = document.getElementById("right-panel");
            if (el) {
              var r = el.getBoundingClientRect();
              if (r && r.height) return r.height;
            }
            var mc = document.getElementById("map-container");
            if (mc) {
              var rc = mc.getBoundingClientRect();
              if (rc && rc.height) return rc.height * 0.38;
            }
            return 0;
          }
          function buildFramingPadding(existing) {
            existing = existing || {};
            var bottomNeeded = getSheetHeight() + SHEET_CLEARANCE_PX;
            return {
              top:    typeof existing.top    === "number" ? Math.max(existing.top, EDGE_PAD_PX) : EDGE_PAD_PX,
              right:  typeof existing.right  === "number" ? Math.max(existing.right, EDGE_PAD_PX) : EDGE_PAD_PX,
              bottom: typeof existing.bottom === "number" ? Math.max(existing.bottom, bottomNeeded) : bottomNeeded,
              left:   typeof existing.left   === "number" ? Math.max(existing.left, EDGE_PAD_PX) : EDGE_PAD_PX,
            };
          }
          function applyFraming(opts, options) {
            opts = Object.assign({}, opts || {});
            opts.padding = buildFramingPadding(opts.padding);
            if (options && options.zoomOut && typeof opts.zoom === "number") {
              opts.zoom = Math.max(0, opts.zoom - ZOOM_OUT_ADJUST);
            }
            // Shorten every camera move during the initial entry window
            // so the drawer lands on the Ozu framing fast. Capped (not
            // zero) so the bundle's step-entry chain, which waits on
            // real moveend events, still gets genuine animation frames.
            if (window.__initialEntry) {
              if (typeof opts.duration !== "number" || opts.duration > 250) {
                opts.duration = 250;
              }
            }
            return opts;
          }
          map.flyTo = function (opts) {
            return origFlyTo(applyMode(applyFraming(opts, { zoomOut: true })));
          };
          map.easeTo = function (opts) {
            return origEaseTo(applyMode(applyFraming(opts, { zoomOut: true })));
          };
          map.fitBounds = function (bounds, opts) {
            return origFitBounds(bounds, applyMode(applyFraming(opts, { zoomOut: false })));
          };
          // Auto-fit to step content.
          // When the bundle adds a GeoJSON source (the arcs, polygons,
          // dots, routes it draws for the current step), widen the camera
          // to the union of recently-added source bounds so every piece of
          // the step's on-map content is visible, framed per the sheet
          // clearance rules above. Runs only after the map's first idle so
          // basemap sources loaded during boot are excluded.
          //
          // Step-specific opt-outs: for properties the bundle's zone
          // camera (_propertyZoneMap.ozu-properties.camera) already
          // produces the desired Ozu framing; auto-fitting to the zone
          // polygon + property markers zooms in too tight. Let the
          // zone fly stand.
          var SKIP_AUTOFIT_STEPS = ["properties"];
          var contentBatch = null;
          var batchTimer = null;
          var mapReady = false;
          map.once("idle", function () { mapReady = true; });
          function currentStepId() {
            var a = window.App;
            var steps = window.STEPS;
            if (!a || !a.state || !steps) return null;
            var s = steps[a.state.currentStep - 1];
            return (s && s.id) || null;
          }
          function computeGeoJSONBounds(g) {
            var mnLng = Infinity, mnLat = Infinity, mxLng = -Infinity, mxLat = -Infinity;
            function consume(c) {
              if (typeof c[0] === "number") {
                if (c[0] < mnLng) mnLng = c[0];
                if (c[0] > mxLng) mxLng = c[0];
                if (c[1] < mnLat) mnLat = c[1];
                if (c[1] > mxLat) mxLat = c[1];
              } else if (Array.isArray(c)) {
                for (var i = 0; i < c.length; i++) consume(c[i]);
              }
            }
            var feats = g && g.type === "FeatureCollection" ? g.features : [g];
            for (var i = 0; i < feats.length; i++) {
              var f = feats[i];
              if (!f) continue;
              var geom = f.type === "Feature" ? f.geometry : f;
              if (geom && geom.coordinates) consume(geom.coordinates);
            }
            if (mnLng === Infinity) return null;
            return [[mnLng, mnLat], [mxLng, mxLat]];
          }
          function bumpBatch(b) {
            if (!contentBatch) {
              contentBatch = [[b[0][0], b[0][1]], [b[1][0], b[1][1]]];
            } else {
              contentBatch[0][0] = Math.min(contentBatch[0][0], b[0][0]);
              contentBatch[0][1] = Math.min(contentBatch[0][1], b[0][1]);
              contentBatch[1][0] = Math.max(contentBatch[1][0], b[1][0]);
              contentBatch[1][1] = Math.max(contentBatch[1][1], b[1][1]);
            }
            if (batchTimer) clearTimeout(batchTimer);
            batchTimer = setTimeout(function () {
              var b2 = contentBatch;
              contentBatch = null;
              batchTimer = null;
              if (!b2) return;
              function clearEntryWindow() {
                window.__initialEntry = false;
                if (window.__initialEntryTimer) {
                  clearTimeout(window.__initialEntryTimer);
                  window.__initialEntryTimer = null;
                }
              }
              if (SKIP_AUTOFIT_STEPS.indexOf(currentStepId()) !== -1) {
                // Step opted out of auto-fit. Clear the duration cap
                // so user-initiated pan/zoom later animates at the
                // natural speed, but LEAVE the overlay alone — this
                // drawer's activateOzu sets its own moveend handler
                // to uncover after the final explicit fitBounds
                // lands, so the user never sees an intermediate
                // camera state.
                clearEntryWindow();
                return;
              }
              map.stop();
              map.once("moveend", function () {
                clearEntryWindow();
                if (typeof window.__uncoverSetup === "function") {
                  window.__uncoverSetup();
                }
              });
              map.fitBounds(b2, { duration: 600 });
            }, 250);
          }
          var origAddSource = map.addSource.bind(map);
          map.addSource = function (id, src) {
            var r = origAddSource(id, src);
            if (mapReady && src && src.type === "geojson" && src.data) {
              var b = computeGeoJSONBounds(src.data);
              if (b) bumpBatch(b);
            }
            return r;
          };
          if (typeof map.removeSource === "function") {
            var origRemoveSource = map.removeSource.bind(map);
            map.removeSource = function (id) {
              contentBatch = null;
              if (batchTimer) { clearTimeout(batchTimer); batchTimer = null; }
              return origRemoveSource(id);
            };
          }
          // Apply initial mode + framing to the current view
          origEaseTo(applyFraming({
            center: map.getCenter(),
            zoom: map.getZoom(),
            pitch: getMode() === "2d" ? 0 : PITCH_3D,
            bearing: getMode() === "2d" ? 0 : map.getBearing(),
            duration: 0,
          }, { zoomOut: false }));
          btn.addEventListener("click", function () {
            var next = getMode() === "2d" ? "3d" : "2d";
            localStorage.setItem(STORAGE_KEY, next);
            setLabel();
            origEaseTo(applyFraming({
              center: map.getCenter(),
              zoom: map.getZoom(),
              pitch: next === "2d" ? 0 : PITCH_3D,
              bearing: next === "2d" ? 0 : map.getBearing(),
              duration: 500,
            }, { zoomOut: false }));
          });
        }
        function waitForMap() {
          if (window.__mbmap) {
            patchMap(window.__mbmap);
            return;
          }
          setTimeout(waitForMap, 80);
        }
        waitForMap();
      })();
    </script>

    <!-- Step-12 drawer scope:
           Starts on: properties step with Ozu zone activated and
                      Ozu 1 selected in the dashboard.
           Navigable: single step (the drawer's URL passes
                      ?steps=properties so the bundle's K is one
                      entry, indexed 1).
         The bundle's App.init() does NOT call goToStep(1) — that only
         happens inside restart(). So the drawer sits at currentStep=0
         forever unless we fire the jump ourselves. After goToStep
         settles, we activate the Ozu zone via the bundle's own public
         method `_handlePropertySubItem("ozu-properties")`, which sets
         state, draws the zone polygon + Ozu property markers, flies
         the camera to the Ozu coords, and renders the zone panel.
         `selectProperty("ozu-1")` then focuses Ozu 1 specifically. -->
    <script>
      (function () {
        var TARGET_STEP = 1;
        var MIN_STEP = 1;
        var MAX_STEP = 1;
        function wrap(app) {
          if (!app || typeof app.goToStep !== "function" || app.__stepRedirect) return;
          app.__stepRedirect = true;
          var orig = app.goToStep.bind(app);
          app.goToStep = function (n) {
            if (n < MIN_STEP) n = MIN_STEP;
            if (n > MAX_STEP) n = MAX_STEP;
            if (app.state && app.state.currentStep === n) {
              return Promise.resolve();
            }
            // Fast-entry window: applyFraming caps camera durations
            // while this is true so the entry lands quickly. Cleared
            // by bumpBatch's moveend (or by the skip-autofit path) or
            // by the safety timer.
            window.__initialEntry = true;
            if (window.__initialEntryTimer) clearTimeout(window.__initialEntryTimer);
            window.__initialEntryTimer = setTimeout(function () {
              window.__initialEntry = false;
            }, 3000);
            return orig(n);
          };
        }
        var _app;
        try {
          Object.defineProperty(window, "App", {
            configurable: true,
            enumerable: true,
            get: function () { return _app; },
            set: function (v) { _app = v; wrap(v); },
          });
        } catch (_e) {
          (function poll() {
            if (window.App) { wrap(window.App); return; }
            setTimeout(poll, 20);
          })();
        }
        function activateOzu() {
          // Ozu zone: draws the zone polygon, adds the Ozu property
          // marker, flies to the zone camera (3D/52 pitch), and
          // renders the zone panel.
          try { window.App._handlePropertySubItem("ozu-properties"); } catch (_) {}
          // Add context lines + endpoint markers (Jasm, station,
          // airport, road) for Ozu 1 WITHOUT switching the panel to
          // the property detail — the bundle's selectProperty couples
          // the two, so call the map part directly via MapController.
          try {
            var prop = window.AppData
              && window.AppData.properties
              && window.AppData.properties.find(function (p) { return p && p.id === "ozu-1"; });
            if (prop && window.MapController && typeof window.MapController.showPropertyContextLines === "function") {
              window.MapController.showPropertyContextLines(prop);
            }
          } catch (_) {}
          // Both _handlePropertySubItem and showPropertyContextLines
          // end with their own flyTo/fitBounds. The zone camera
          // (zoom 12.7 at pitch 52) is designed for 3D and looks too
          // tight once applyMode forces pitch:0 for 2D. The property
          // camera is even tighter (street level). Override with an
          // explicit wide bounds covering Kikuchi → Mashiki and
          // Koshi → Shirakawa so the full corridor is in frame with
          // the Ozu marker sitting in the upper half above the sheet.
          try {
            var m = window.__mbmap;
            if (m) {
              // Uncover the overlay once THIS final fitBounds lands
              // so the user never sees an intermediate bundle camera
              // (zone flyTo, context-lines flyTo) before the wide
              // corridor framing is in place.
              m.once("moveend", function () {
                window.__initialEntry = false;
                if (window.__initialEntryTimer) {
                  clearTimeout(window.__initialEntryTimer);
                  window.__initialEntryTimer = null;
                }
                if (typeof window.__uncoverSetup === "function") {
                  window.__uncoverSetup();
                }
              });
              m.fitBounds(
                [[130.76, 32.78], [130.95, 32.94]],
                { duration: 250 }
              );
            }
          } catch (_) {}
        }
        var triggered = false;
        function triggerInitial() {
          if (triggered) return;
          if (!window.App || typeof window.App.goToStep !== "function") {
            setTimeout(triggerInitial, 40);
            return;
          }
          var m = window.__mbmap;
          if (!m || typeof m.isStyleLoaded !== "function" || !m.isStyleLoaded()) {
            setTimeout(triggerInitial, 40);
            return;
          }
          triggered = true;
          // Pretend we came from a non-zero step so the bundle takes
          // the single-flyTo branch instead of the dramatic double-fly
          // intro, cutting ~2s off entry. Step index 2 is safe since
          // this drawer only has one step; _exitStep on a never-
          // entered step is a no-op.
          if (window.App.state) {
            window.App.state.currentStep = 2;
          }
          window.__initialEntry = true;
          Promise.resolve(window.App.goToStep(TARGET_STEP))
            .then(activateOzu)
            .catch(function () { activateOzu(); });
        }
        triggerInitial();
      })();
    </script>
